<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>American Corner Kids - Welcome!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }
        .activity-card {
            transition: all 0.3s ease;
        }
        .activity-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 12px 24px rgba(245, 87, 108, 0.2);
        }
        .checkbox-custom:checked {
            background-color: #f5576c;
            border-color: #f5576c;
        }
    </style>
</head>
<body class="min-h-screen py-10 px-4 font-sans">
   <nav class="bg-white shadow-lg px-6 py-5 mb-8 rounded-xl">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="bg-gradient-to-br from-red-500 to-pink-600 text-white p-2 rounded-lg">
                    <i class="fa-solid fa-flag-usa text-lg"></i>
                </div>
                <div>
                    <span class="font-bold text-gray-800 text-lg tracking-tight">American Corner</span>
                    <p class="text-xs text-gray-500">Kids Adventure Portal</p>
                </div>
            </div>
            <div class="hidden md:flex space-x-8">
                <a href="index.html" class="text-gray-600 hover:text-red-600 transition pb-2">Adult Entry</a>
                <a href="child-signin.html" class="text-red-600 font-semibold border-b-2 border-red-600 pb-2">Kids Entry</a>
                <a href="dashboard.html" class="text-gray-600 hover:text-red-600 transition pb-2">Admin Dashboard</a>
            </div>
        </div>
    </nav>
   
    <div class="max-w-3xl mx-auto">
        <div class="bg-white shadow-2xl rounded-3xl overflow-hidden border-4 border-pink-200">
            <div class="bg-gradient-to-r from-pink-500 via-red-500 to-pink-600 p-10 text-white text-center">
                <div class="inline-block bg-white bg-opacity-20 p-4 rounded-2xl mb-4">
                    <i class="fa-solid fa-heart text-4xl"></i>
                </div>
                <h1 class="text-4xl font-black mb-2">Welcome to the Corner! 🎨</h1>
                <p class="text-pink-100 text-lg font-semibold">Let's get you ready to explore amazing things!</p>
            </div>

            <form class="p-10 space-y-8">
                <!-- Simple Name Section -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="form-group">
                        <label class="block text-lg font-bold text-gray-800 mb-3 flex items-center gap-2">
                            <i class="fa-solid fa-child text-pink-600"></i>My First Name
                        </label>
                        <input type="text" name="firstName" placeholder="Your name here" class="w-full p-4 border-2 border-pink-200 rounded-2xl focus:border-pink-500 focus:outline-none focus:ring-2 focus:ring-pink-300 bg-pink-50/50 placeholder-gray-400 font-medium">
                    </div>
                    <div class="form-group">
                        <label class="block text-lg font-bold text-gray-800 mb-3 flex items-center gap-2">
                            <i class="fa-solid fa-user text-pink-600"></i>My Last Name
                        </label>
                        <input type="text" name="lastName" placeholder="Your family name" class="w-full p-4 border-2 border-pink-200 rounded-2xl focus:border-pink-500 focus:outline-none focus:ring-2 focus:ring-pink-300 bg-pink-50/50 placeholder-gray-400 font-medium">
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="form-group">
                        <label class="block text-lg font-bold text-gray-800 mb-3 flex items-center gap-2">
                            <i class="fa-solid fa-person text-pink-600"></i>Your Gender
                        </label>
                        <select name="sex" class="w-full p-4 border-2 border-pink-200 rounded-2xl focus:border-pink-500 focus:outline-none focus:ring-2 focus:ring-pink-300 bg-white font-medium">
                            <option>Male</option>
                            <option>Female</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="block text-lg font-bold text-gray-800 mb-3 flex items-center gap-2">
                            <i class="fa-solid fa-book text-pink-600"></i>What grade are you in?
                        </label>
                        <input type="text" name="grade" placeholder="e.g. Grade 5" class="w-full p-4 border-2 border-pink-200 rounded-2xl focus:border-pink-500 focus:outline-none focus:ring-2 focus:ring-pink-300 bg-pink-50/50 placeholder-gray-400 font-medium">
                    </div>
                    <div class="form-group">
                        <label class="block text-lg font-bold text-gray-800 mb-3 flex items-center gap-2">
                            <i class="fa-solid fa-school text-pink-600"></i>Name of School
                        </label>
                        <input type="text" name="school" placeholder="e.g. Faith Baptist School" class="w-full p-4 border-2 border-pink-200 rounded-2xl focus:border-pink-500 focus:outline-none focus:ring-2 focus:ring-pink-300 bg-pink-50/50 placeholder-gray-400 font-medium">
                    </div>
                    <div class="form-group">
                        <label class="block text-lg font-bold text-gray-800 mb-3 flex items-center gap-2">
                            <i class="fa-solid fa-map-marker-alt text-pink-600"></i>Where do you live?
                        </label>
                        <select name="address" class="w-full p-4 border-2 border-pink-200 rounded-2xl focus:border-pink-500 focus:outline-none focus:ring-2 focus:ring-pink-300 bg-white font-medium">
                            <option>Chipata Compound</option>
                            <option>Musonda Compound</option>
                            <option>Riverside</option>
                            <option>Nkana East</option> 
                            <option>Nkana West</option>
                            <option>Wusakile</option>
                            <option>Kwacha</option>
                            <option>CBU</option>
                            <option>Ndeke</option>
                            <option>Bulangililo</option>
                            <option>Kalulushi</option>
                            <option>New Kitwe</option>
                            <option>Parklands</option>
                            <option>Mufuchani</option>
                            <option>Ipusukilo</option>
                            <option>Other</option>  
                        </select>
                    </div>
                </div>

                <!-- Activities Section with Icons -->
                <div>
                    <label class="block text-2xl font-black text-center text-gray-800 mb-6 flex items-center justify-center gap-2">
                        <i class="fa-solid fa-star text-pink-600"></i> What do you want to do today?
                    </label>
                    <div class="grid grid-cols-2 gap-4" id="activitiesGrid">
                        <div class="activity-card cursor-pointer border-2 border-gray-200 rounded-2xl p-5 text-center hover:border-pink-400 hover:shadow-lg transition-all" onclick="toggleActivity(this, 'Learn About Computers and their operations')">
                            <div class="text-4xl mb-3">💻</div>
                            <div class="text-sm font-bold text-gray-800">Learn About Computers</div>
                        </div>
                        <div class="activity-card cursor-pointer border-2 border-gray-200 rounded-2xl p-5 text-center hover:border-green-400 hover:shadow-lg transition-all" onclick="toggleActivity(this, 'Read Books')">
                            <div class="text-4xl mb-3">📚</div>
                            <div class="text-sm font-bold text-gray-800">Read Books</div>
                        </div>
                        <div class="activity-card cursor-pointer border-2 border-gray-200 rounded-2xl p-5 text-center hover:border-blue-400 hover:shadow-lg transition-all" onclick="toggleActivity(this, 'Joining Book Clubs')">
                            <div class="text-4xl mb-3">🛠️</div>
                            <div class="text-sm font-bold text-gray-800">Join Book Clubs</div>
                        </div>
                        <div class="activity-card cursor-pointer border-2 border-gray-200 rounded-2xl p-5 text-center hover:border-purple-400 hover:shadow-lg transition-all" onclick="toggleActivity(this, 'Playing games')">
                            <div class="text-4xl mb-3">🎮</div>
                            <div class="text-sm font-bold text-gray-800">Play Games</div>
                        </div>
                    </div>
                    <input type="hidden" name="interest" id="selectedActivities" value="">
                </div>

                <!-- Simplified Gadget Question -->
                <div class="bg-gradient-to-r from-red-100 to-pink-100 p-8 rounded-2xl text-center border-2 border-pink-300">
                    <p class="font-bold text-gray-800 mb-4 text-lg flex items-center justify-center gap-2">
                        <i class="fa-solid fa-laptop text-pink-600"></i> What gadget do you want to use?
                    </p>
                    <select name="gadget" class="w-full p-4 border-2 border-pink-300 rounded-2xl focus:border-pink-600 focus:outline-none focus:ring-2 focus:ring-pink-300 bg-white font-medium">
                        <option>Headphones 🎧</option>
                        <option>Chromebook 💻</option>
                        <option>iPad 📱</option>
                        <option>Portable DVD Player 🎬</option>
                        <option>None</option>
                        <option>Other</option>
                    </select>
                </div>

                <!-- Admin Notes Section (Optional) -->
                <div class="bg-gradient-to-r from-purple-50 to-pink-50 p-6 rounded-2xl border-2 border-purple-200">
                    <label class="block text-sm font-bold text-gray-800 mb-3 flex items-center gap-2">
                        <i class="fa-solid fa-note-sticky text-purple-600"></i>Notes (Optional - For Admin Use)
                    </label>
                    <textarea name="adminNotes" placeholder="Leave empty - admin will add notes about device condition if borrowed" class="w-full p-3 border-2 border-purple-300 rounded-xl focus:ring-2 focus:ring-purple-500 placeholder-gray-400 h-16 resize-none text-sm" disabled></textarea>
                </div>

                <button type="submit" class="w-full bg-gradient-to-r from-pink-500 via-red-500 to-pink-600 text-white font-black text-2xl py-6 rounded-2xl hover:shadow-2xl shadow-lg transform transition-all hover:scale-105 active:scale-95 flex items-center justify-center gap-2">
                    <i class="fa-solid fa-rocket"></i> I'M READY! 🚀
                </button>
            </form>
        </div>
    </div>

    <script>
        const selectedActivities = new Set();
        
        function toggleActivity(element, activityName) {
            element.classList.toggle('border-pink-400');
            element.classList.toggle('bg-pink-100');
            
            if (selectedActivities.has(activityName)) {
                selectedActivities.delete(activityName);
            } else {
                selectedActivities.add(activityName);
            }
            
            document.getElementById('selectedActivities').value = Array.from(selectedActivities).join(', ');
        }
        
        document.querySelector('form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const interests = Array.from(selectedActivities).length > 0 ? Array.from(selectedActivities) : [];
            
            const visitor = {
                id: Date.now().toString(),
                type: 'child',
                status: 'active',
                timestamp: new Date().toISOString(),
                firstName: formData.get('firstName'),
                lastName: formData.get('lastName'),
                sex: formData.get('sex'),
                grade: formData.get('grade'),
                school: formData.get('school'),
                address: formData.get('address'),
                interest: interests.join(', ') || 'None',
                needsGadget: formData.get('gadget') !== 'None' ? 'yes' : 'no',
                gadget: formData.get('gadget'),
                adminNotes: ''
            };
            
            const visitors = JSON.parse(localStorage.getItem('ac_visitors')) || [];
            visitors.push(visitor);
            localStorage.setItem('ac_visitors', JSON.stringify(visitors));
            
            alert('Welcome to the Corner! Have fun exploring! 🎉');
            window.location.href = 'dashboard.html';
        });
    </script>
</body>
</html>
